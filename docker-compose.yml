services:
  nginx:
    image: nginx:alpine
    container_name: picknlight-nginx
    ports:
      - "7050:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - picknlight-net
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.picknlight.rule=Host(`picknlight.server24-7.net`)
      - traefik.http.routers.picknlight.tls=true
      - traefik.http.routers.picknlight.tls.certresolver=cloudflare
      - traefik.http.services.picknlight.loadbalancer.server.scheme=http
      - traefik.http.services.picknlight.loadbalancer.server.port=7050

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: picknlight-frontend
    restart: unless-stopped
    networks:
      - picknlight-net
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: picknlight-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-picknlight}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-picknlight}
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - LED_AUTO_OFF_SECONDS=${LED_AUTO_OFF_SECONDS:-30}
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped
    networks:
      - picknlight-net

  postgres:
    image: postgres:16-alpine
    container_name: picknlight-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-picknlight}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-picknlight}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-picknlight} -d ${POSTGRES_DB:-picknlight}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - picknlight-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: picknlight-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped
    networks:
      - picknlight-net

volumes:
  pgdata:
  mosquitto-data:
  mosquitto-log:

networks:
  picknlight-net:
    driver: bridge
  proxy:
    external: true
